<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Advanced QR Scanner</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
    <script>QrScanner.WORKER_PATH = 'https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js';</script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .scan-window { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75); }
        .bracket { border-color: #0a84ff; border-style: solid; }
        @keyframes pulse-bracket { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
        .scanning .bracket { animation: pulse-bracket 2s ease-in-out infinite; }
        @keyframes scan-line { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: calc(100% - 3px); opacity: 0; } }
        .scan-line { animation: scan-line 2.5s linear infinite; }
        /* Hide scrollbar for history */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full bg-[#121212] overflow-hidden font-sans text-white">

    <audio id="beep-sound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU... (shortened for brevity, browser will play standard beep fallback if empty)" preload="auto"></audio>

    <video id="video-bg" class="absolute inset-0 w-full h-full object-cover z-0"></video>
    
    <div class="absolute top-0 left-0 right-0 z-20 flex justify-between items-center p-6 bg-gradient-to-b from-black/80 to-transparent">
        <h1 class="text-xl font-bold tracking-wide">ProScanner<span class="text-[#0a84ff]">.</span></h1>
        <button id="history-btn" class="p-2 rounded-full bg-white/10 backdrop-blur-md active:scale-95">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </button>
    </div>

    <div class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
        <div class="scan-window w-64 h-64 rounded-2xl relative scanning" id="scan-frame">
            <div class="bracket absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 rounded-tl-2xl"></div>
            <div class="bracket absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 rounded-tr-2xl"></div>
            <div class="bracket absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 rounded-bl-2xl"></div>
            <div class="bracket absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 rounded-br-2xl"></div>
            <div class="scan-line absolute left-2 right-2 h-[3px] bg-[#0a84ff] shadow-[0_0_15px_#0a84ff] rounded-full"></div>
        </div>
    </div>
    <p id="status-text" class="absolute bottom-32 left-0 right-0 z-20 text-center text-white/80 text-sm font-medium tracking-wide">Align QR code within the frame</p>

    <div class="absolute bottom-8 left-0 right-0 z-20 flex justify-center gap-8 px-8">
        <button id="camera-switch-btn" class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center transition-transform active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        </button>
        <button id="flash-btn" class="w-16 h-16 rounded-full bg-[#0a84ff] shadow-[0_0_20px_rgba(10,132,255,0.4)] flex items-center justify-center transition-transform active:scale-90">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        </button> 
        <label class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center cursor-pointer transition-transform active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
            <input type="file" id="file-input" accept="image/*" class="hidden"> 
        </label>
    </div>

    <div id="result-sheet" class="absolute bottom-0 left-0 right-0 bg-[#1e1e1e] rounded-t-[32px] z-40 translate-y-full transition-transform duration-300 ease-out shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col max-h-[85vh]">
        <div class="p-5 pb-0 flex-shrink-0">
            <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-5 cursor-grab" id="drag-handle"></div>
            <div class="flex justify-between items-center mb-4">
                <p class="text-gray-400 text-sm font-bold uppercase tracking-wider">Scan Result</p>
                <span id="data-type-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-[#0a84ff]/20 text-[#0a84ff]">Text</span>
            </div>
        </div>
        <div class="overflow-y-auto p-5 pt-0 no-scrollbar flex-grow">
            <div class="bg-black/40 p-5 rounded-2xl mb-6 border border-white/5">
                <p id="result-text" class="text-white text-lg leading-relaxed break-words font-mono"></p>
            </div>
            <div class="flex flex-col gap-3" id="action-buttons-container">
                </div>
            <button id="scan-again-btn" class="mt-4 w-full py-4 rounded-xl text-base font-bold bg-white/10 text-white transition-opacity active:opacity-70"> Scan Another Code </button>
        </div>
    </div>

    <div id="history-sheet" class="absolute inset-0 bg-[#121212] z-50 translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 flex items-center gap-4 bg-black/40 border-b border-white/10">
            <button id="close-history-btn" class="p-2 bg-white/10 rounded-full active:scale-95"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
            <h2 class="text-xl font-bold">Scan History</h2>
            <button id="clear-history-btn" class="ml-auto text-red-500 text-sm font-bold uppercase tracking-wider active:opacity-70">Clear</button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 no-scrollbar">
            </div>
    </div>

    <div id="error-state" class="absolute inset-0 z-30 bg-[#121212] flex flex-col items-center justify-center p-8 text-center hidden">
        <svg class="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        <h2 class="text-xl font-bold mb-2">Camera Unavailable</h2>
        <p class="text-gray-400 mb-6 text-sm">Please allow camera permissions or upload an image from your gallery.</p>
        <label class="px-8 py-4 rounded-full bg-[#0a84ff] text-white font-bold cursor-pointer active:scale-95 transition-transform">
            Upload Image <input type="file" accept="image/*" class="hidden" id="fallback-file-input"> 
        </label>
    </div>

    <script>
        let qrScanner = null;
        let flashOn = false;
        let currentCamera = 'environment'; // 'user' for front, 'environment' for back
        let scanHistory = JSON.parse(localStorage.getItem('qr_history')) || [];

        const ui = {
            video: document.getElementById('video-bg'),
            sheet: document.getElementById('result-sheet'),
            resultText: document.getElementById('result-text'),
            badge: document.getElementById('data-type-badge'),
            actionBtns: document.getElementById('action-buttons-container'),
            errorState: document.getElementById('error-state'),
            scanFrame: document.getElementById('scan-frame'),
            historySheet: document.getElementById('history-sheet'),
            historyList: document.getElementById('history-list'),
            beep: document.getElementById('beep-sound')
        };

        // Initialize App
        async function startApp() {
            try {
                qrScanner = new QrScanner(ui.video, result => processScan(result.data), {
                    preferredCamera: currentCamera,
                    returnDetailedScanResult: true,
                    highlightScanRegion: false
                });
                await qrScanner.start();
                document.getElementById('camera-switch-btn').style.display = (await QrScanner.hasCamera()) ? 'flex' : 'none';
            } catch (e) { ui.errorState.classList.remove('hidden'); }
        }

        // Smart Data Parser
        function parseQRData(data) {
            let type = 'Text';
            let actions = [];

            if (/^https?:\/\//i.test(data)) {
                type = 'Website URL';
                actions.push({ label: 'Open Link', color: 'bg-[#0a84ff]', action: () => window.open(data, '_blank') });
            } else if (/^WIFI:/i.test(data)) {
                type = 'WiFi Network';
                const ssid = data.match(/S:(.*?);/)?.[1] || 'Network';
                const pass = data.match(/P:(.*?);/)?.[1] || '';
                ui.resultText.innerHTML = `<b>SSID:</b> ${ssid}<br><b>Password:</b> ${pass}`;
                if(pass) actions.push({ label: 'Copy Password', color: 'bg-[#0a84ff]', action: () => copyToClip(pass) });
            } else if (/^mailto:/i.test(data)) {
                type = 'Email Address';
                actions.push({ label: 'Send Email', color: 'bg-red-500', action: () => window.location.href = data });
            } else if (/^tel:/i.test(data)) {
                type = 'Phone Number';
                actions.push({ label: 'Call Number', color: 'bg-green-500', action: () => window.location.href = data });
            } else if (/^BEGIN:VCARD/i.test(data)) {
                type = 'Contact Card';
                actions.push({ label: 'Download Contact', color: 'bg-[#0a84ff]', action: () => downloadVCard(data) });
            }
            
            actions.push({ label: 'Copy All Text', color: 'bg-white/10', action: () => copyToClip(data) });
            return { type, actions, raw: data };
        }

        function processScan(data) {
            if(!data) return;
            if(qrScanner) qrScanner.pause();
            
            // Audio & Haptic Feedback
            ui.beep.play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

            ui.scanFrame.classList.remove('scanning');
            ui.errorState.classList.add('hidden');
            
            // Parse & Save
            const parsed = parseQRData(data);
            if(parsed.type !== 'WiFi Network') ui.resultText.textContent = data;
            ui.badge.textContent = parsed.type;
            
            // Build Action Buttons dynamically
            ui.actionBtns.innerHTML = '';
            parsed.actions.forEach(btn => {
                const b = document.createElement('button');
                b.className = `w-full py-4 rounded-xl text-base font-bold text-white transition-transform active:scale-95 ${btn.color}`;
                b.textContent = btn.label;
                b.onclick = btn.action;
                ui.actionBtns.appendChild(b);
            });

            saveToHistory(parsed.type, data);
            ui.sheet.style.transform = 'translateY(0)';
        }

        // Helpers
        function copyToClip(text) {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }

        function downloadVCard(data) {
            const blob = new Blob([data], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'contact.vcf';
            a.click();
        }

        // History Management
        function saveToHistory(type, data) {
            const entry = { type, data, time: new Date().toLocaleString() };
            // Don't save duplicates in a row
            if(scanHistory.length === 0 || scanHistory[0].data !== data) {
                scanHistory.unshift(entry);
                if(scanHistory.length > 50) scanHistory.pop(); // Keep last 50
                localStorage.setItem('qr_history', JSON.stringify(scanHistory));
            }
        }

        function renderHistory() {
            ui.historyList.innerHTML = '';
            if(scanHistory.length === 0) ui.historyList.innerHTML = '<p class="text-gray-500 text-center mt-10">No scans yet.</p>';
            scanHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white/5 p-4 rounded-xl border border-white/10 active:bg-white/10';
                div.innerHTML = `<div class="flex justify-between mb-1"><span class="text-xs text-[#0a84ff] font-bold">${item.type}</span><span class="text-xs text-gray-500">${item.time}</span></div><p class="text-sm truncate">${item.data}</p>`;
                div.onclick = () => { ui.historySheet.style.transform = 'translateX(100%)'; processScan(item.data); };
                ui.historyList.appendChild(div);
            });
        }

        // Controls
        document.getElementById('flash-btn').onclick = async () => {
            if(!qrScanner) return;
            try { flashOn = !flashOn; await qrScanner.toggleFlash(); document.getElementById('flash-btn').classList.toggle('bg-yellow-500'); } catch(e){}
        };

        document.getElementById('camera-switch-btn').onclick = async () => {
            currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
            if(qrScanner) { qrScanner.setCamera(currentCamera); }
        };

        const handleImage = (file) => {
            if(!file) return;
            QrScanner.scanImage(file, { returnDetailedScanResult: true })
                .then(res => processScan(res.data || res))
                .catch(() => alert('No QR found in image.'));
        };
        document.getElementById('file-input').onchange = (e) => handleImage(e.target.files[0]);
        document.getElementById('fallback-file-input').onchange = (e) => handleImage(e.target.files[0]);

        document.getElementById('scan-again-btn').onclick = () => {
            ui.sheet.style.transform = 'translateY(100%)';
            ui.scanFrame.classList.add('scanning');
            if(qrScanner) qrScanner.start().catch(()=>{});
        };

        // UI Interactions
        document.getElementById('history-btn').onclick = () => { renderHistory(); ui.historySheet.style.transform = 'translateX(0)'; };
        document.getElementById('close-history-btn').onclick = () => ui.historySheet.style.transform = 'translateX(100%)';
        document.getElementById('clear-history-btn').onclick = () => { scanHistory = []; localStorage.removeItem('qr_history'); renderHistory(); };

        // Drag to close sheet
        let startY = 0;
        document.getElementById('drag-handle').addEventListener('touchstart', e => startY = e.touches[0].clientY);
        document.getElementById('drag-handle').addEventListener('touchmove', e => {
            const dy = e.touches[0].clientY - startY;
            if (dy > 0) ui.sheet.style.transform = `translateY(${dy}px)`;
        });
        document.getElementById('drag-handle').addEventListener('touchend', e => {
            if(parseInt(ui.sheet.style.transform.replace(/[^0-9]/g, '')) > 100) {
                document.getElementById('scan-again-btn').click();
            } else { ui.sheet.style.transform = 'translateY(0)'; }
        });

        startApp();
    </script>
</body>
</html>
