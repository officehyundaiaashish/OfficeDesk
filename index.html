<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR Scanner</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://unpkg.com/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
  <script>
      QrScanner.WORKER_PATH = 'https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js';
  </script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
        * { -webkit-tap-highlight-color: transparent; }
        .scan-window { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65); }
        .bracket { border-color: white; border-style: solid; }
        @keyframes pulse-bracket { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .scanning .bracket { animation: pulse-bracket 1.5s ease-in-out infinite; }
        @keyframes scan-line { 0% { top: 0; } 50% { top: calc(100% - 3px); } 100% { top: 0; } }
        .scan-line { animation: scan-line 2s ease-in-out infinite; }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-black overflow-hidden">
  <video id="video-bg" class="absolute inset-0 w-full h-full object-cover z-0"></video>
  
  <div class="absolute inset-0 z-10 flex items-center justify-content pointer-events-none">
   <div class="scan-window w-64 h-64 rounded-3xl relative mx-auto scanning" id="scan-frame">
    <div class="bracket absolute top-[-2px] left-[-2px] w-10 h-10 border-t-4 border-l-4 rounded-tl-3xl"></div>
    <div class="bracket absolute top-[-2px] right-[-2px] w-10 h-10 border-t-4 border-r-4 rounded-tr-3xl"></div>
    <div class="bracket absolute bottom-[-2px] left-[-2px] w-10 h-10 border-b-4 border-l-4 rounded-bl-3xl"></div>
    <div class="bracket absolute bottom-[-2px] right-[-2px] w-10 h-10 border-b-4 border-r-4 rounded-br-3xl"></div>
    <div class="scan-line absolute left-2 right-2 h-[3px] bg-gradient-to-r from-transparent via-blue-400 to-transparent rounded-full"></div>
   </div>
  </div>
  
  <div class="absolute top-12 left-0 right-0 z-20 text-center">
   <h1 id="app-title" class="text-white text-xl font-semibold mb-2">QR Scanner</h1>
   <p id="status-text" class="text-white/70 text-sm">Point camera at a QR code</p>
  </div>
  
  <div class="absolute bottom-12 left-0 right-0 z-20 flex justify-center gap-5">
    <button id="flash-btn" class="w-14 h-14 rounded-full bg-white/15 backdrop-blur-xl flex items-center justify-center border border-white/10 transition-all hover:bg-white/25 active:scale-95">
    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
    </button> 
    <label class="w-14 h-14 rounded-full bg-white/15 backdrop-blur-xl flex items-center justify-center border border-white/10 cursor-pointer transition-all hover:bg-white/25 active:scale-95">
    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
    <input type="file" id="file-input" accept="image/*" class="hidden"> 
    </label>
  </div>
  
  <div id="result-sheet" class="absolute bottom-0 left-0 right-0 bg-[#1c1c1e] px-5 pt-6 pb-10 rounded-t-[32px] z-30 translate-y-full transition-transform duration-400 ease-out shadow-2xl">
   <div class="w-9 h-1.5 bg-[#48484a] rounded-full mx-auto mb-6 cursor-grab" id="drag-handle"></div>
   <p class="text-[#8e8e93] text-xs uppercase tracking-wider font-semibold mb-3">Scanned Result</p>
   <div class="bg-white/5 p-4 rounded-2xl mb-6">
    <p id="result-text" class="text-[#f2f2f7] text-base leading-relaxed break-all"></p>
   </div>
   <div class="flex flex-col gap-3">
    <button id="open-link-btn" class="w-full py-4 rounded-2xl text-base font-semibold bg-[#0a84ff] text-white transition-opacity active:opacity-70 hidden"> Open Link </button> 
    <button id="copy-btn" class="w-full py-4 rounded-2xl text-base font-semibold bg-[#2c2c2e] text-[#0a84ff] transition-opacity active:opacity-70"> Copy to Clipboard </button> 
    <button id="scan-again-btn" class="w-full py-4 rounded-2xl text-base font-semibold bg-[#2c2c2e] text-[#8e8e93] transition-opacity active:opacity-70"> Scan Again </button>
   </div>
  </div>
  
  <div id="error-state" class="absolute inset-0 z-40 bg-[#1c1c1e] flex flex-col items-center justify-center p-8 text-center hidden">
   <div class="w-20 h-20 rounded-full bg-red-500/20 flex items-center justify-center mb-6">
    <svg class="w-10 h-10 text-red-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
   </div>
   <h2 class="text-white text-xl font-semibold mb-2">Camera Blocked by Platform</h2>
   <p id="error-message-text" class="text-white/60 text-sm mb-6">Please upload a photo of the QR code to scan it.</p>
   <label class="px-6 py-3 rounded-xl bg-[#0a84ff] text-white font-semibold cursor-pointer"> 
    Upload QR Image 
    <input type="file" accept="image/*" class="hidden" id="fallback-file-input"> 
   </label>
  </div>

  <script>
        const defaultConfig = { app_title: 'QR Scanner', primary_color: '#0a84ff', background_color: '#1c1c1e' };
        let config = { ...defaultConfig };
        let qrScanner = null;
        let flashOn = false;
        
        const video = document.getElementById('video-bg');
        const statusText = document.getElementById('status-text');
        const resultSheet = document.getElementById('result-sheet');
        const resultText = document.getElementById('result-text');
        const flashBtn = document.getElementById('flash-btn');
        const fileInput = document.getElementById('file-input');
        const fallbackFileInput = document.getElementById('fallback-file-input');
        const openLinkBtn = document.getElementById('open-link-btn');
        const copyBtn = document.getElementById('copy-btn');
        const scanAgainBtn = document.getElementById('scan-again-btn');
        const errorState = document.getElementById('error-state');
        const scanFrame = document.getElementById('scan-frame');
        const appTitle = document.getElementById('app-title');
        
        async function initScanner() {
            try {
                qrScanner = new QrScanner(
                    video,
                    result => handleScanResult(result.data || result),
                    { returnDetailedScanResult: true, highlightScanRegion: false, highlightCodeOutline: false }
                );
                await qrScanner.start();
                statusText.textContent = 'Point camera at a QR code';
            } catch (error) {
                errorState.classList.remove('hidden');
            }
        }
        
        function handleScanResult(data) {
            if (!data) return;
            errorState.classList.add('hidden');
            if (qrScanner) qrScanner.pause();
            
            resultText.textContent = data;
            scanFrame.classList.remove('scanning');
            
            const isURL = /^https?:\/\//i.test(data);
            openLinkBtn.classList.toggle('hidden', !isURL);
            openLinkBtn.onclick = () => window.open(data, '_blank', 'noopener,noreferrer');
            
            resultSheet.style.transform = 'translateY(0)';
            if (navigator.vibrate) navigator.vibrate(50);
        }
        
        flashBtn.addEventListener('click', async () => {
            if (!qrScanner) return;
            try {
                flashOn = !flashOn;
                await qrScanner.toggleFlash();
                flashBtn.classList.toggle('bg-yellow-500/30', flashOn);
            } catch (e) {}
        });
        
        // FIXED IMAGE UPLOAD LOGIC
        function handleFileSelect(file) {
            if (!file) return;
            
            const errorMsg = document.getElementById('error-message-text');
            const originalText = errorMsg.innerText;
            errorMsg.innerText = "Scanning image... please wait";

            QrScanner.scanImage(file)
                .then(result => {
                    // result abhi properly string aayega
                    const decodedText = result.data ? result.data : result;
                    handleScanResult(decodedText);
                    errorMsg.innerText = originalText;
                })
                .catch(err => {
                    console.error(err);
                    errorMsg.innerText = 'No QR code found in that image. Try another.';
                    setTimeout(() => { errorMsg.innerText = originalText; }, 3000);
                });
        }
        
        fileInput.addEventListener('change', e => handleFileSelect(e.target.files[0]));
        fallbackFileInput.addEventListener('change', e => handleFileSelect(e.target.files[0]));
        
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(resultText.textContent);
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy to Clipboard'; }, 1500);
            } catch (e) {}
        });
        
        scanAgainBtn.addEventListener('click', () => {
            resultSheet.style.transform = 'translateY(100%)';
            scanFrame.classList.add('scanning');
            if (qrScanner) qrScanner.start().catch(e => errorState.classList.remove('hidden'));
        });
        
        let startY = 0;
        const dragHandle = document.getElementById('drag-handle');
        dragHandle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        dragHandle.addEventListener('touchmove', e => {
            const deltaY = e.touches[0].clientY - startY;
            if (deltaY > 0) resultSheet.style.transform = `translateY(${deltaY}px)`;
        });
        dragHandle.addEventListener('touchend', e => {
            const currentTransform = resultSheet.style.transform;
            const match = currentTransform.match(/translateY\((\d+)px\)/);
            if (match && parseInt(match[1]) > 100) {
                resultSheet.style.transform = 'translateY(100%)';
                scanFrame.classList.add('scanning');
                if (qrScanner) qrScanner.start().catch(e => errorState.classList.remove('hidden'));
            } else {
                resultSheet.style.transform = 'translateY(0)';
            }
        });
        
        initScanner();
    </script>
 </body>
</html>
